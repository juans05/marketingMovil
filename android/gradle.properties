org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Fix: Kotlin incremental compilation fails on Windows when project (D:\) and
# pub cache (C:\) are on different drives. Disabling incremental avoids the
# "this and base files have different roots" AssertionError.
kotlin.incremental=false
kotlin.daemon.jvm.options="-Xmx4g"
