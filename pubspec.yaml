name: vidalis_mobile
description: "Vidalis.AI — App móvil nativa para marketing digital con IA."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP
  http: ^1.2.1

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.2

  # Charts
  fl_chart: ^0.69.0

  # Images
  cached_network_image: ^3.4.1

  # Media picker
  image_picker: ^1.1.2

  # Video player
  video_player: ^2.9.1

  # Dates
  intl: ^0.19.0

  # URL / deep links
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
